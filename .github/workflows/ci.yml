name: CI Build

# Builds the StormDNS/CottenDns native client, runs unit tests, and produces an
# installable debug APK on every push and pull request so changes can be built
# and tested from CI without a local Android toolchain.

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

env:
  ANDROID_API: "26"
  GRADLE_ANDROID_NDK_VERSION: "26.3.11579264"
  STORMDNS_ANDROID_NDK_VERSION: "29.0.14206865"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build debug APK and run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout WhiteDNS
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          set -euo pipefail
          command -v sdkmanager
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;${GRADLE_ANDROID_NDK_VERSION}" \
            "ndk;${STORMDNS_ANDROID_NDK_VERSION}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: third_party/StormDNS/go.mod
          cache-dependency-path: third_party/StormDNS/go.sum

      - name: Build native DNS-tunnel clients
        run: |
          set -euo pipefail
          make stormdns \
            NDK_HOST=linux-x86_64 \
            NDK_ROOT="${ANDROID_HOME}/ndk/${STORMDNS_ANDROID_NDK_VERSION}"

      - name: Run unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Build debug APKs
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Upload debug APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: whitedns-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore
